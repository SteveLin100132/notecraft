<!-- @dsCard group="Colors" viewport="700x190" name="Brand Blue" subtitle="Primary navy→azure — authority & stability" -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-xs); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; }
  .name { font-size: 12px; font-weight: 700; color: var(--text-strong); }
  .hex { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); text-transform: uppercase; }
  .lbl { font-size: 11px; color: var(--text-muted); margin: 0 0 12px; letter-spacing: .04em; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--blue-700)"></div><div class="meta"><div class="name">Primary 700</div><div class="hex">#1b4f9c</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-500)"></div><div class="meta"><div class="name">Azure 500</div><div class="hex">#2c6ebb</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-900)"></div><div class="meta"><div class="name">900</div><div class="hex">#112f5d</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-300)"></div><div class="meta"><div class="name">300</div><div class="hex">#7ba6da</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-100)"></div><div class="meta"><div class="name">100</div><div class="hex">#d6e4f5</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-50)"></div><div class="meta"><div class="name">50</div><div class="hex">#eef4fb</div></div></div>
  </div>
</body>
</html>
