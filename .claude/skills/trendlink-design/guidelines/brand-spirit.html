<!-- @dsCard group="Brand" viewport="700x200" name="Brand Spirit 聯和趨動" subtitle="The four-character ethos behind the name" -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-brand-soft); font-family: var(--font-sans); }
  .row { display: flex; gap: 14px; }
  .col { flex: 1; background: #fff; border-radius: var(--radius-lg); padding: 18px 16px; box-shadow: var(--shadow-sm); border-top: 4px solid var(--blue-500); }
  .col:nth-child(even) { border-top-color: var(--orange-400); }
  .ch { font-size: 40px; font-weight: 900; color: var(--blue-700); line-height: 1; }
  .col:nth-child(even) .ch { color: var(--orange-500); }
  .word { font-size: 15px; font-weight: 700; color: var(--text-strong); margin-top: 10px; }
  .desc { font-size: 12px; color: var(--text-muted); margin-top: 4px; line-height: 1.6; }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="ch">聯</div><div class="word">聯結夥伴</div><div class="desc">聯結共戰夥伴</div></div>
    <div class="col"><div class="ch">和</div><div class="word">和睦溝通</div><div class="desc">和睦專業溝通</div></div>
    <div class="col"><div class="ch">趨</div><div class="word">趨動前進</div><div class="desc">趨動企業前進</div></div>
    <div class="col"><div class="ch">動</div><div class="word">動見成長</div><div class="desc">動見瞻觀成長</div></div>
  </div>
</body>
</html>
