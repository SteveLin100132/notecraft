<!-- @dsCard group="Colors" viewport="700x150" name="Signature Gradients" subtitle="Header navy→azure · Accent gold" -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; gap: 14px; }
  .g { flex: 1; height: 86px; border-radius: var(--radius-lg); display: flex; align-items: flex-end; padding: 12px 14px; color: #fff; box-shadow: var(--shadow-sm); }
  .lbl { font-size: 12px; font-weight: 700; }
  .sub { font-size: 10px; opacity: .85; font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="g" style="background:var(--gradient-header)"><span><div class="lbl">--gradient-header</div><div class="sub">105° · blue-800 → blue-500</div></span></div>
    <div class="g" style="background:var(--gradient-accent)"><span><div class="lbl">--gradient-accent</div><div class="sub">105° · orange-500 → orange-400</div></span></div>
  </div>
</body>
</html>
