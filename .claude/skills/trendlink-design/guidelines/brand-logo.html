<!-- @dsCard group="Brand" viewport="700x220" name="Logo & Wordmark" subtitle="Primary mark · stock code 7645" -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 0; background: var(--surface-card); font-family: var(--font-sans); display: flex; }
  .half { flex: 1; display: flex; align-items: center; justify-content: center; gap: 16px; padding: 30px; }
  .on-light { background: #fff; }
  .on-dark { background: var(--gradient-header); }
  .mark { width: 76px; height: 76px; border-radius: 14px; object-fit: contain; background: #fff; padding: 4px; }
  .wm { display: flex; flex-direction: column; }
  .cn { font-size: 27px; font-weight: 900; letter-spacing: .06em; line-height: 1; }
  .en { font-size: 12px; font-weight: 700; letter-spacing: .18em; margin-top: 6px; }
  .code { font-size: 10px; margin-top: 6px; letter-spacing: .1em; }
  .light .cn { color: var(--blue-700); } .light .en { color: var(--orange-500); } .light .code { color: var(--text-muted); }
  .dark .cn { color: #fff; } .dark .en { color: var(--orange-300); } .dark .code { color: rgba(255,255,255,.7); }
</style>
</head>
<body>
  <div class="half on-light light">
    <img class="mark" src="../assets/logo/trendlink-logo.jpeg" alt="TrendLink">
    <div class="wm"><span class="cn">聯和趨動</span><span class="en">TREND LINK</span><span class="code">股票代號 7645</span></div>
  </div>
  <div class="half on-dark dark">
    <img class="mark" src="../assets/logo/trendlink-logo.jpeg" alt="TrendLink">
    <div class="wm"><span class="cn">聯和趨動</span><span class="en">TREND LINK</span><span class="code">股票代號 7645</span></div>
  </div>
</body>
</html>
