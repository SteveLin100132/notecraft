<!-- @dsCard group="Colors" viewport="700x200" name="Neutrals" subtitle="Cool blue-tinted grays for text & surfaces" -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; }
  .chip { height: 56px; border-radius: var(--radius-sm); box-shadow: inset 0 0 0 1px rgba(17,47,93,.06); }
  .name { font-size: 11px; font-weight: 700; color: var(--text-strong); margin-top: 6px; }
  .hex { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--neutral-0)"></div><div class="name">0</div><div class="hex">#ffffff</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-50)"></div><div class="name">50</div><div class="hex">#f6f8fb</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-100)"></div><div class="name">100</div><div class="hex">#eef1f6</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-200)"></div><div class="name">200</div><div class="hex">#e1e6ee</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-300)"></div><div class="name">300</div><div class="hex">#cbd3df</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-400)"></div><div class="name">400</div><div class="hex">#9aa6b8</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-500)"></div><div class="name">500</div><div class="hex">#6c798e</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-700)"></div><div class="name">700</div><div class="hex">#3a4456</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-900)"></div><div class="name">900</div><div class="hex">#161c28</div></div>
  </div>
</body>
</html>
