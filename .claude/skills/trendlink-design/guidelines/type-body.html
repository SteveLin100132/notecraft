<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px; background: var(--surface-card); }
  .tag { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); display: block; margin-bottom: 4px; }
  .lead { font-size: var(--text-md); color: var(--text-body); line-height: 1.8; margin-bottom: 16px; max-width: 620px; }
  .body { font-size: var(--text-base); color: var(--text-body); line-height: 1.8; margin-bottom: 16px; max-width: 620px; }
  .sm { font-size: var(--text-sm); color: var(--text-muted); margin-bottom: 16px; }
  .eyebrow { font-size: var(--text-sm); font-weight: 700; letter-spacing: .12em; color: var(--text-accent); text-transform: uppercase; }
</style>
</head>
<body>
  <span class="tag">Lead · 18 / 400</span>
  <p class="lead">運用科技力量，提供全方位的勞資法務、人力資源解決方案。</p>
  <span class="tag">Body · 16 / 400</span>
  <p class="body">透過專業顧問面談與輔導，協助正確執行勞動法令、結合職能分析建立完整人資制度，達成勞資和諧、穩健發展之基礎。</p>
  <span class="tag">Caption · 14 / 400 muted</span>
  <p class="sm">將不定期提供最新勞動法令應用、人資管理資訊。</p>
  <span class="tag">Eyebrow · 14 / 700 · tracking-wider</span>
  <div class="eyebrow">SOLUTIONS</div>
</body>
</html>
