<!-- @dsCard group="Colors" viewport="700x190" name="Brand Orange" subtitle="Warm golden accent — CTAs & logo swoosh" -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-xs); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; }
  .name { font-size: 12px; font-weight: 700; color: var(--text-strong); }
  .hex { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--orange-400)"></div><div class="meta"><div class="name">CTA 400</div><div class="hex">#ed9b26</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--orange-500)"></div><div class="meta"><div class="name">Deep 500</div><div class="hex">#e37b24</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--orange-600)"></div><div class="meta"><div class="name">600</div><div class="hex">#c7641a</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--orange-300)"></div><div class="meta"><div class="name">300</div><div class="hex">#f2b955</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--orange-100)"></div><div class="meta"><div class="name">100</div><div class="hex">#fbe7c6</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--orange-50)"></div><div class="meta"><div class="name">50</div><div class="hex">#fdf4e6</div></div></div>
  </div>
</body>
</html>
