<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing Scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); font-family: var(--font-latin); }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .item { text-align: center; }
  .bar { background: var(--gradient-accent); border-radius: var(--radius-xs); width: 100%; }
  .k { font-size: 10px; font-family: var(--font-mono); color: var(--text-muted); margin-top: 6px; }
  .v { font-size: 11px; color: var(--text-strong); font-weight: 700; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><div class="v">4</div><div class="k">space-1</div></div>
    <div class="item"><div class="bar" style="height:8px"></div><div class="v">8</div><div class="k">space-2</div></div>
    <div class="item"><div class="bar" style="height:12px"></div><div class="v">12</div><div class="k">space-3</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="v">16</div><div class="k">space-4</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="v">24</div><div class="k">space-5</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="v">32</div><div class="k">space-6</div></div>
    <div class="item"><div class="bar" style="height:48px"></div><div class="v">48</div><div class="k">space-8</div></div>
    <div class="item"><div class="bar" style="height:64px"></div><div class="v">64</div><div class="k">space-9</div></div>
  </div>
</body>
</html>
