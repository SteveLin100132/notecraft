<!-- @dsCard group="Type" viewport="700x210" name="Type Scale" subtitle="11 → 60px modular ramp" -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 26px; background: var(--surface-card); font-family: var(--font-latin); }
  .r { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--border-subtle); }
  .r:last-child { border: 0; }
  .k { width: 64px; font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); flex: none; }
  .px { width: 48px; font-size: 11px; color: var(--text-muted); flex: none; text-align: right; }
  .s { color: var(--text-strong); font-weight: 600; white-space: nowrap; }
</style>
</head>
<body>
  <div class="r"><span class="k">5xl</span><span class="px">60</span><span class="s" style="font-size:34px">TrendLink</span></div>
  <div class="r"><span class="k">3xl</span><span class="px">36</span><span class="s" style="font-size:26px">TrendLink</span></div>
  <div class="r"><span class="k">xl</span><span class="px">24</span><span class="s" style="font-size:22px">TrendLink 聯和趨動</span></div>
  <div class="r"><span class="k">base</span><span class="px">16</span><span class="s" style="font-size:16px">TrendLink 聯和趨動</span></div>
  <div class="r"><span class="k">sm</span><span class="px">14</span><span class="s" style="font-size:14px">TrendLink 聯和趨動</span></div>
  <div class="r"><span class="k">xs</span><span class="px">12</span><span class="s" style="font-size:12px">TrendLink 聯和趨動</span></div>
</body>
</html>
