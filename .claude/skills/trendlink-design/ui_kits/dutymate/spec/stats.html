<!--
  =====================================================================
  Duty Mate · 出勤統計 (Attendance Statistics)
  =====================================================================
  自包含規格頁 — 所有 HTML、CSS、JS 都在這一個檔案裡。
  供 AI Agent 讀取時，一次取得該頁面的完整上下文。

  ▸ 頁面用途：
    檢視各值日生的年度排班統計（平均/實際/缺勤次數），確認排班是否平均。
    點姓名可聯動下方月曆，篩選該值日生的出勤日。

  ▸ 角色權限：
    admin  — 可查看
    duty   — 無權限（nav 不顯示）

  ▸ 此頁使用的 state 欄位：
    state.official            — 所有已發布班表（按月計算統計）
    state.publishedMonths     — 已發布月份列表
    state.users               — 可排班人員
    state.activities          — 停班/補班（判定缺勤）
    state.year                — 預設統計年度

  ▸ 主要互動流程：
    1. 年度 select 切換統計年度
    2. 表格列出每人：平均次數、實際次數、缺勤（停班日被排班）
    3. 點姓名列 → 高亮 + 下方月曆篩選該人
    4. 月曆顯示出勤 NameChip / 缺勤標記

  ▸ 導航：側邊選單所有項目 → 對應 <id>.html

  ▸ 外部相依（非本檔內容）：
    - React 18 / ReactDOM 18 / Babel Standalone（CDN）
    - _ds_bundle.js：設計系統元件庫，提供 window.TrendLinkDesignSystem_b2a0d6
      其中本頁用到：Button, Badge（從 DS 解構使用）
  =====================================================================
-->

/* --- Google Fonts (from tokens/fonts.css) --- */
/* ============================================================
   TrendLink 聯和趨動 — Webfonts
   ------------------------------------------------------------
   The brand site uses a clean Traditional-Chinese humanist sans.
   We ship Noto Sans TC (the de-facto standard for zh-TW web UI)
   as the primary face, with Noto Sans for crisp Latin / numerals.
   Loaded from Google Fonts CDN.

   ⚠ SUBSTITUTION NOTE: the live trendlink.com.tw site serves its
   own bundled CJK font; we could not extract the original binary,
   so Noto Sans TC is used as the nearest high-quality match.
   Swap the @import below if the brand font files are provided.
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Sans:wght@400;500;600;700&display=swap');

/* --- Design System Tokens: Colors (tokens/colors.css) --- */
/* ============================================================
   TrendLink 聯和趨動 — Color Tokens
   ------------------------------------------------------------
   Brand DNA: a trustworthy corporate BLUE (drawn from the
   navy→azure header gradient and logo mark) paired with a warm
   GOLDEN-ORANGE accent (CTA buttons, logo swoosh). Blue carries
   authority & stability; orange carries warmth & approachability
   toward SME owners. Neutrals are cool, slightly blue-tinted.
   ============================================================ */

:root {
  /* ---- Brand blue (primary) ----------------------------- */
  --blue-50:  #eef4fb;
  --blue-100: #d6e4f5;
  --blue-200: #adc8e8;
  --blue-300: #7ba6da;
  --blue-400: #4d84cb;
  --blue-500: #2c6ebb;   /* azure — right side of header gradient */
  --blue-600: #1f5aa6;
  --blue-700: #1b4f9c;   /* PRIMARY navy — left side of header   */
  --blue-800: #163f7d;
  --blue-900: #112f5d;
  --blue-950: #0b1f3e;

  /* ---- Sky / cyan (secondary brand accent) -------------- */
  --sky-400: #4aa3d6;
  --sky-500: #348bc9;    /* search circle / highlight blue       */
  --sky-600: #2a76ad;

  /* ---- Brand orange (accent / CTA) ---------------------- */
  --orange-50:  #fdf4e6;
  --orange-100: #fbe7c6;
  --orange-200: #f6cd86;
  --orange-300: #f2b955;
  --orange-400: #ed9b26;  /* primary CTA gold                    */
  --orange-500: #e37b24;  /* logo swoosh / hover deep orange     */
  --orange-600: #c7641a;
  --orange-700: #a04f15;

  /* ---- Neutral (cool, blue-tinted grays) ---------------- */
  --neutral-0:   #ffffff;
  --neutral-50:  #f6f8fb;
  --neutral-100: #eef1f6;
  --neutral-200: #e1e6ee;
  --neutral-300: #cbd3df;
  --neutral-400: #9aa6b8;
  --neutral-500: #6c798e;
  --neutral-600: #4f5b6e;
  --neutral-700: #3a4456;
  --neutral-800: #262e3d;
  --neutral-900: #161c28;

  /* ---- Semantic status ---------------------------------- */
  --success-500: #2e9e6b;
  --success-50:  #e7f6ee;
  --warning-500: #e3a008;
  --warning-50:  #fcf3da;
  --danger-500:  #d64545;
  --danger-50:   #fbeaea;
  --info-500:    #2c6ebb;
  --info-50:     #eef4fb;

  /* ============================================================
     SEMANTIC ALIASES — reach for these in product UI
     ============================================================ */

  /* Text */
  --text-strong:   var(--neutral-900);   /* headings              */
  --text-body:     var(--neutral-700);   /* paragraph copy        */
  --text-muted:    var(--neutral-500);   /* captions, meta        */
  --text-on-brand: #ffffff;              /* text on blue/orange   */
  --text-brand:    var(--blue-700);      /* blue headings & links */
  --text-accent:   var(--orange-500);

  /* Surfaces */
  --surface-page:    var(--neutral-50);
  --surface-card:    var(--neutral-0);
  --surface-sunken:  var(--neutral-100);
  --surface-brand:   var(--blue-700);
  --surface-brand-soft: var(--blue-50);
  --surface-accent-soft: var(--orange-50);
  --surface-inverse: var(--neutral-900);

  /* Borders */
  --border-subtle:  var(--neutral-200);
  --border-default: var(--neutral-300);
  --border-strong:  var(--neutral-400);
  --border-brand:   var(--blue-500);

  /* Interactive */
  --action-primary:        var(--orange-400);
  --action-primary-hover:  var(--orange-500);
  --action-primary-press:  var(--orange-600);
  --action-secondary:      var(--blue-700);
  --action-secondary-hover:var(--blue-800);
  --action-link:           var(--blue-600);
  --focus-ring:            var(--sky-500);

  /* Signature header gradient (navy → azure, ~12° like the site) */
  --gradient-header: linear-gradient(105deg, var(--blue-800) 0%, var(--blue-700) 45%, var(--blue-500) 100%);
  --gradient-accent: linear-gradient(105deg, var(--orange-500) 0%, var(--orange-400) 100%);
}

/* --- Design System Tokens: Typography (tokens/typography.css) --- */
/* ============================================================
   TrendLink 聯和趨動 — Typography Tokens
   ------------------------------------------------------------
   One humanist sans family carries everything (zh-TW + Latin).
   Weights: 400 regular body, 500 medium UI, 700 bold headings,
   900 black for hero display. Generous line-height for CJK
   legibility (1.7 body, 1.3 headings). Latin/numerals fall
   through to Noto Sans for crisp figures.
   ============================================================ */

:root {
  /* ---- Families ---------------------------------------- */
  --font-sans: "Noto Sans TC", "Noto Sans", "PingFang TC",
               "Microsoft JhengHei", "Helvetica Neue", system-ui, sans-serif;
  --font-latin: "Noto Sans", "Noto Sans TC", system-ui, sans-serif;
  --font-mono: "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;

  /* ---- Weights ----------------------------------------- */
  --weight-regular: 400;
  --weight-medium:  500;
  --weight-bold:    700;
  --weight-black:   900;

  /* ---- Type scale (px → rem at 16px base) -------------- */
  --text-2xs:  0.6875rem;  /* 11 — micro labels            */
  --text-xs:   0.75rem;    /* 12 — captions, meta          */
  --text-sm:   0.875rem;   /* 14 — secondary UI            */
  --text-base: 1rem;       /* 16 — body                    */
  --text-md:   1.125rem;   /* 18 — lead body               */
  --text-lg:   1.25rem;    /* 20 — card titles             */
  --text-xl:   1.5rem;     /* 24 — section sub-heads       */
  --text-2xl:  1.875rem;   /* 30 — H3                      */
  --text-3xl:  2.25rem;    /* 36 — H2                      */
  --text-4xl:  2.875rem;   /* 46 — H1                      */
  --text-5xl:  3.75rem;    /* 60 — hero display            */

  /* ---- Line heights ------------------------------------ */
  --leading-tight:   1.25;
  --leading-snug:    1.4;
  --leading-normal:  1.6;
  --leading-relaxed: 1.8;   /* long-form CJK prose          */

  /* ---- Letter spacing (CJK likes a touch of tracking) -- */
  --tracking-tight:  -0.01em;
  --tracking-normal: 0;
  --tracking-wide:   0.04em;
  --tracking-wider:  0.12em;  /* eyebrow / overline labels  */

  /* ---- Semantic roles ---------------------------------- */
  --display-font: var(--font-sans);
  --display-weight: var(--weight-black);
  --heading-font: var(--font-sans);
  --heading-weight: var(--weight-bold);
  --body-font: var(--font-sans);
  --body-weight: var(--weight-regular);
}

/* --- Design System Tokens: Spacing & Shadows (tokens/spacing.css) --- */
/* ============================================================
   TrendLink 聯和趨動 — Spacing, Radius, Shadow, Layout Tokens
   ------------------------------------------------------------
   4px base grid. The brand reads CLEAN & ROOMY: large section
   padding, soft-but-shallow shadows, gently rounded cards, and a
   signature FULL PILL radius on primary buttons (from the site's
   orange CTAs).
   ============================================================ */

:root {
  /* ---- Spacing scale (4px grid) ------------------------ */
  --space-0:  0;
  --space-1:  0.25rem;   /* 4   */
  --space-2:  0.5rem;    /* 8   */
  --space-3:  0.75rem;   /* 12  */
  --space-4:  1rem;      /* 16  */
  --space-5:  1.5rem;    /* 24  */
  --space-6:  2rem;      /* 32  */
  --space-7:  2.5rem;    /* 40  */
  --space-8:  3rem;      /* 48  */
  --space-9:  4rem;      /* 64  */
  --space-10: 5rem;      /* 80  */
  --space-12: 7.5rem;    /* 120 — section rhythm */

  /* ---- Radius ------------------------------------------ */
  --radius-xs:   4px;
  --radius-sm:   6px;
  --radius-md:   10px;   /* inputs, small cards          */
  --radius-lg:   16px;   /* cards                        */
  --radius-xl:   24px;   /* feature panels               */
  --radius-2xl:  32px;
  --radius-pill: 999px;  /* CTA buttons, tags, chips     */
  --radius-circle: 50%;

  /* ---- Shadows (soft, cool-tinted, shallow) ------------ */
  --shadow-xs:  0 1px 2px rgba(17, 47, 93, 0.06);
  --shadow-sm:  0 2px 6px rgba(17, 47, 93, 0.08);
  --shadow-md:  0 6px 18px rgba(17, 47, 93, 0.10);
  --shadow-lg:  0 14px 34px rgba(17, 47, 93, 0.12);
  --shadow-xl:  0 24px 60px rgba(17, 47, 93, 0.16);
  /* Warm glow for orange CTAs on hover */
  --shadow-accent: 0 8px 22px rgba(227, 123, 36, 0.32);
  --shadow-brand:  0 10px 28px rgba(27, 79, 156, 0.28);

  /* ---- Borders ----------------------------------------- */
  --border-width: 1px;
  --border-width-strong: 2px;

  /* ---- Focus ring -------------------------------------- */
  --ring-width: 3px;
  --ring-offset: 2px;

  /* ---- Layout ------------------------------------------ */
  --container-max: 1200px;
  --container-narrow: 880px;
  --header-height: 76px;
  --section-pad-y: clamp(3rem, 7vw, 7.5rem);
  --gutter: clamp(1rem, 4vw, 2.5rem); /* @kind spacing */

  /* ---- Motion ------------------------------------------ */
  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */
  --duration-fast: 140ms; /* @kind other */
  --duration-normal: 220ms; /* @kind other */
  --duration-slow: 360ms; /* @kind other */

  /* ---- Z-index ----------------------------------------- */
  --z-sticky: 100; /* @kind other */
  --z-overlay: 500; /* @kind other */
  --z-modal: 600; /* @kind other */
  --z-toast: 700; /* @kind other */
}

/* --- Design System Tokens: Base resets (tokens/base.css) --- */
/* ============================================================
   TrendLink 聯和趨動 — Base element styles & helpers
   Light reset + brand defaults. Safe to ship to consumers.
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; }

html { -webkit-text-size-adjust: 100%; }

body {
  margin: 0;
  font-family: var(--font-sans);
  font-weight: var(--weight-regular);
  font-size: var(--text-base);
  line-height: var(--leading-normal);
  color: var(--text-body);
  background: var(--surface-page);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

h1, h2, h3, h4, h5, h6 {
  margin: 0;
  font-family: var(--heading-font);
  font-weight: var(--heading-weight);
  line-height: var(--leading-tight);
  color: var(--text-strong);
  text-wrap: balance;
}

p { margin: 0; line-height: var(--leading-relaxed); }
p { text-wrap: pretty; }

a { color: var(--action-link); text-decoration: none; }
a:hover { color: var(--blue-700); }

img { max-width: 100%; display: block; }

::selection { background: var(--orange-200); color: var(--blue-900); }

:focus-visible {
  outline: var(--ring-width) solid color-mix(in srgb, var(--focus-ring) 55%, transparent);
  outline-offset: var(--ring-offset);
  border-radius: var(--radius-xs);
}

/* ---- Brand eyebrow / overline label ------------------- */
.tl-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  font-size: var(--text-sm);
  font-weight: var(--weight-bold);
  letter-spacing: var(--tracking-wider);
  color: var(--text-accent);
  text-transform: uppercase;
}
.tl-eyebrow::before {
  content: "";
  width: 28px;
  height: 3px;
  border-radius: var(--radius-pill);
  background: var(--gradient-accent);
}

/* ---- Section title underline accent ------------------- */
.tl-title-accent { position: relative; display: inline-block; }
.tl-title-accent::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -10px;
  width: 56px;
  height: 4px;
  border-radius: var(--radius-pill);
  background: var(--gradient-accent);
}

  users: (s) => ic(<><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13A4 4 0 0 1 16 11"/></>, s),

  import: (s) => ic(<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></>, s),
  swap: (s) => ic(<><path d="M16 3h5v5M21 3l-7 7M8 21H3v-5M3 21l7-7"/></>, s),
  logout: (s) => ic(<><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></>, s),
  bell: (s) => ic(<><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></>, s),
  chevL: (s) => ic(<path d="m15 18-6-6 6-6"/>, s),
  chevR: (s) => ic(<path d="m9 18 6-6-6-6"/>, s),
  chevDown: (s) => ic(<path d="m6 9 6 6 6-6"/>, s),
  plus: (s) => ic(<path d="M12 5v14M5 12h14"/>, s),
  x: (s) => ic(<path d="M18 6 6 18M6 6l12 12"/>, s),
  check: (s) => ic(<path d="M20 6 9 17l-5-5"/>, s),
  menu: (s) => ic(<path d="M4 6h16M4 12h16M4 18h16"/>, s),
  filter: (s) => ic(<path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/>, s),
  spark: (s) => ic(<><path d="M12 3v4M12 17v4M3 12h4M17 12h4M5.6 5.6l2.8 2.8M15.6 15.6l2.8 2.8M18.4 5.6l-2.8 2.8M8.4 15.6l-2.8 2.8"/></>, s),
  trash: (s) => ic(<><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></>, s),
  edit: (s) => ic(<><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5Z"/></>, s),
  warn: (s) => ic(<><path d="m21.7 18-8-14a2 2 0 0 0-3.4 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.7-3Z"/><path d="M12 9v4M12 17h.01"/></>, s),
  note: (s) => ic(<><path d="M15.5 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8.5L15.5 3Z"/><path d="M15 3v6h6M9 13h6M9 17h4"/></>, s),
  task: (s) => ic(<><path d="M16 4h2a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M9 3h6a1 1 0 0 1 1 1v1a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Z"/><path d="m9.5 13 1.8 1.8 3.7-3.8"/></>, s),
  user: (s) => ic(<><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></>, s),

/* ----------------------------- Sample data ----------------------------- */
const USERS = [
  { id: "u1", name: "劉亭筠", role: "duty",  include: true,  email: "tingyun.liu@trendlink.com.tw" },
  { id: "u2", name: "張耘瑄", role: "duty",  include: true,  email: "yunxuan.chang@trendlink.com.tw" },
  { id: "u3", name: "吳金燕", role: "admin", include: true,  email: "jinyan.wu@trendlink.com.tw" },
  { id: "u4", name: "陳舒珊", role: "duty",  include: true,  email: "shushan.chen@trendlink.com.tw" },
  { id: "u5", name: "Vicky Huang", role: "duty", include: false, email: "vicky.huang@trendlink.com.tw" },
  { id: "u6", name: "黃喻靖", role: "duty",  include: true,  email: "yujing.huang@trendlink.com.tw" },
  { id: "u7", name: "黃宣凱", role: "duty",  include: true,  email: "xuankai.huang@trendlink.com.tw" },
];

// "current" month for the demo: 2026 年 6 月
const SEED_YEAR = 2026, SEED_MONTH = 5; // 0-indexed (June)

// Activities: 端午節 (停班) + 補班 (調整上班日)
const SEED_ACTIVITIES = {
  "2026-06-19": { type: "off",    note: "端午節" },
  "2026-06-20": { type: "adjust", note: "端午節補班" },
};

// 排除時段（各值日生不能排的日期）
const SEED_EXCLUSIONS = {
  u1: ["2026-06-08", "2026-06-09"],
  u2: ["2026-06-15"],
  u4: ["2026-06-22", "2026-06-23"],
  u6: ["2026-06-11"],
  u7: ["2026-06-03", "2026-06-29"],
};

const SEED_TASKS = [
  { id: "t1", text: "上午 8:30 前開啟辦公室門窗與冷氣" },
  { id: "t2", text: "倒茶水間與影印區垃圾、更換垃圾袋" },
  { id: "t3", text: "補充茶水間紙杯與飲用水" },
  { id: "t4", text: "下班前巡檢會議室電源與門窗" },
];

/* ----------------------------- Date helpers ----------------------------- */
const WK = ["日", "一", "二", "三", "四", "五", "六"];
const pad2 = (n) => String(n).padStart(2, "0");
const dstr = (y, m, d) => `${y}-${pad2(m + 1)}-${pad2(d)}`;
const daysInMonth = (y, m) => new Date(y, m + 1, 0).getDate();
const isWeekend = (date) => { const w = date.getDay(); return w === 0 || w === 6; };
const MONTH_LABEL = (y, m) => `${y} 年 ${m + 1} 月`;

// schedulable: a base weekday that isn't 停班日, OR a weekend that's 調整上班日
function isSchedulable(date, dateStr, activities) {
  const a = activities[dateStr];
  if (a && a.type === "off") return false;
  if (isWeekend(date)) return !!(a && a.type === "adjust");
  return true;
}

function schedulableDays(year, month, activities) {
  const out = [];
  for (let d = 1; d <= daysInMonth(year, month); d++) {
    const date = new Date(year, month, d);
    const ds = dstr(year, month, d);
    if (isSchedulable(date, ds, activities)) out.push(ds);
  }
  return out;
}

// pool = users that are 列入排班
const schedulingPool = (users) => users.filter((u) => u.include);

function counts(schedule, pool) {
  const c = {}; pool.forEach((u) => (c[u.id] = 0));
  Object.values(schedule).forEach((uid) => { if (c[uid] != null) c[uid]++; });
  return c;
}

// 推薦演算法：排除停班日、納入調整上班日、平均分配、間隔 ≥3 天、避開排除時段。
// 不覆蓋既有指派（PRD：推薦僅針對尚未排班的部分）。
function recommend(year, month, users, exclusions, activities, existing = {}) {
  const pool = schedulingPool(users);
  const days = schedulableDays(year, month, activities);
  const result = { ...existing };
  const cnt = counts(result, pool);
  const last = {};
  Object.keys(result).forEach((ds) => {
    const d = parseInt(ds.slice(-2), 10);
    if (last[result[ds]] == null || d > last[result[ds]]) last[result[ds]] = d;
  });
  const open = days.filter((ds) => !result[ds]);
  for (const ds of open) {
    const dnum = parseInt(ds.slice(-2), 10);
    let cand = pool.filter((u) => !(exclusions[u.id] || []).includes(ds));
    const spaced = cand.filter((u) => last[u.id] == null || dnum - last[u.id] >= 3);
    let use = spaced.length ? spaced : cand;
    if (!use.length) continue; // 無人可排 → 留空（發布時提醒）
    use = use.slice().sort((a, b) => (cnt[a.id] - cnt[b.id]) || ((last[a.id] || 0) - (last[b.id] || 0)));
    const pick = use[0];
    result[ds] = pick.id;
    cnt[pick.id]++; last[pick.id] = dnum;
  }
  return result;
}

const userById = (users, id) => users.find((u) => u.id === id);
const roleLabel = (r) => (r === "admin" ? "排班負責人" : "值日生");

window.Duty = {
  DutyIcons, USERS, SEED_YEAR, SEED_MONTH, SEED_ACTIVITIES, SEED_EXCLUSIONS, SEED_TASKS,
  WK, pad2, dstr, daysInMonth, isWeekend, MONTH_LABEL, isSchedulable, schedulableDays,
  schedulingPool, counts, recommend, userById, roleLabel,
};

</script>

<script type="text/babel">
// Duty Mate — reusable month calendar. Provides the grid shell + weekday header
// + optional month nav; delegates each day's body to a renderCell(ctx) prop.
// Exposes window.Duty.MonthCalendar + DayCell helpers.

const { WK, dstr, daysInMonth, isWeekend, MONTH_LABEL } = window.Duty;

function MonthNav({ year, month, onPrev, onNext, onToday, locked, right }) {
  const { DutyIcons } = window.Duty;
  const btn = {
    width: 38, height: 38, borderRadius: 10, border: "1px solid var(--border-default)",
    background: "#fff", color: "var(--text-body)", display: "inline-flex", alignItems: "center",
    justifyContent: "center", cursor: locked ? "not-allowed" : "pointer", opacity: locked ? 0.4 : 1,
  };
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <button style={btn} onClick={() => !locked && onPrev()} aria-label="上個月">{DutyIcons.chevL(18)}</button>
        <div style={{ fontSize: 18, fontWeight: 800, color: "var(--text-strong)", minWidth: 130, textAlign: "center" }}>
          {MONTH_LABEL(year, month)}
        </div>
        <button style={btn} onClick={() => !locked && onNext()} aria-label="下個月">{DutyIcons.chevR(18)}</button>
      </div>
      {onToday && (
        <button onClick={() => !locked && onToday()} style={{
          height: 38, padding: "0 14px", borderRadius: 10, border: "1px solid var(--border-default)",
          background: "#fff", color: "var(--text-body)", fontWeight: 600, fontSize: 13.5, cursor: "pointer",
          fontFamily: "var(--font-sans)", opacity: locked ? 0.4 : 1,
        }}>本月</button>
      )}

          {DutyIcons.lock(14)} 鎖定當前月份
        </span>
      )}
      <div style={{ marginLeft: "auto" }}>{right}</div>
    </div>
  );
}

function MonthCalendar({ year, month, renderCell, weekStart = 0 }) {
  const total = daysInMonth(year, month);
  const firstDow = new Date(year, month, 1).getDay();
  const lead = (firstDow - weekStart + 7) % 7;
  const todayStr = (() => { const t = new Date(); return dstr(t.getFullYear(), t.getMonth(), t.getDate()); })();
  const header = Array.from({ length: 7 }, (_, i) => WK[(weekStart + i) % 7]);

  const cells = [];
  for (let i = 0; i < lead; i++) cells.push(<div key={"p" + i} className="dm-cell dm-cell-empty" />);
  for (let d = 1; d <= total; d++) {
    const date = new Date(year, month, d);
    const ds = dstr(year, month, d);
    const ctx = { date, dateStr: ds, day: d, isToday: ds === todayStr, isWeekend: isWeekend(date), dow: date.getDay() };
    cells.push(<React.Fragment key={ds}>{renderCell(ctx)}</React.Fragment>);
  }
  while (cells.length % 7 !== 0) cells.push(<div key={"t" + cells.length} className="dm-cell dm-cell-empty" />);

  return (
    <div className="dm-cal">
      <div className="dm-weekhead">
        {header.map((w, i) => (
          <div key={w} className="dm-wh" style={{ color: (weekStart + i) % 7 === 0 || (weekStart + i) % 7 === 6 ? "var(--text-muted)" : "var(--text-body)" }}>{w}</div>
        ))}
      </div>
      <div className="dm-grid">{cells}</div>
    </div>
  );
}

// A standard styled day cell shell used by most views.
function DayCell({ ctx, tone = "default", disabled, onClick, ribbon, children, selected }) {
  // tone: default | off | adjust | muted
  const toneStyle = {
    default: { background: "#fff", borderColor: "var(--border-subtle)" },
    off:     { background: "var(--danger-50)", borderColor: "color-mix(in srgb, var(--danger-500) 22%, var(--border-subtle))" },
    adjust:  { background: "var(--success-50)", borderColor: "color-mix(in srgb, var(--success-500) 26%, var(--border-subtle))" },
    muted:   { background: "var(--neutral-50)", borderColor: "var(--border-subtle)" },
  }[tone];
  return (
    <div
      className={"dm-cell" + (onClick && !disabled ? " dm-clickable" : "") + (selected ? " dm-selected" : "")}
      onClick={() => onClick && !disabled && onClick(ctx)}
      style={{
        ...toneStyle,
        cursor: onClick && !disabled ? "pointer" : "default",
        opacity: disabled ? 0.55 : 1,
        outline: ctx.isToday ? "2px solid var(--blue-500)" : "none",
        outlineOffset: -2,
      }}
    >
      <div className="dm-cell-top">
        <span className="dm-daynum" style={{ color: ctx.dow === 0 || ctx.dow === 6 ? "var(--text-muted)" : "var(--text-strong)" }}>{ctx.day}</span>
        {ribbon}
      </div>
      <div className="dm-cell-body">{children}</div>
    </div>
  );
}

      const [yy, mm] = mk.split("-").map(Number);
      const sched = state.official[mk] || {};
      schedTotal += D.schedulableDays(yy, mm - 1, state.activities).length;
      Object.entries(sched).forEach(([ds, uid]) => {
        if (uid === u.id) {
          const a = state.activities[ds];
          if (a && a.type === "off") absent++; else actual++;
        }
      });
    });
    const avg = pool.length ? schedTotal / pool.length : 0;
    return { u, avg, actual, absent };
  });

  const cmKey = `${yr}-${D.pad2(cm + 1)}`;
  const cmSched = state.official[cmKey] || {};

  return (
    <div>
      <D.PageHeader icon={D.DutyIcons.stats(22)} title="出勤統計"
        desc="檢視各值日生的排班平均次數、實際排班次數與缺勤次數，確認排班是否平均。"
        actions={
          <label style={{ display: "inline-flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 12.5, color: "var(--text-muted)" }}>{D.DutyIcons.calendar(15)} 統計年度</span>
            <select className="dm-input" style={{ width: "auto", height: 38, fontWeight: 700 }}
              value={yr} onChange={(e) => setYr(Number(e.target.value))}>
              {Array.from({ length: 6 }, (_, i) => state.year - i).map((y) => (
                <option key={y} value={y}>{y} 年</option>
              ))}
            </select>
          </label>
        } />
      {months.length === 0 && <div className="dm-banner" style={{ marginBottom: 16 }}>{D.DutyIcons.warn(16)} {yr} 年尚無已發布的班表，數據將於發布後累計。</div>}
      <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
        <div className="dm-card" style={{ padding: 0, overflow: "hidden" }}>
          <table className="dm-table">
            <thead><tr><th>值日生</th><th style={{ textAlign: "right" }}>平均次數</th><th style={{ textAlign: "right" }}>實際次數</th><th style={{ textAlign: "right" }}>缺勤</th></tr></thead>
            <tbody>
              {rows.map(({ u, avg, actual, absent }) => (
                <tr key={u.id} className={"dm-rowsel" + (pick === u.id ? " on" : "")} onClick={() => setPick(pick === u.id ? null : u.id)}>
                  <td><div style={{ display: "flex", alignItems: "center", gap: 10 }}><span className="dm-avatar sm">{u.name[0]}</span><span style={{ fontWeight: 600, color: pick === u.id ? "var(--blue-700)" : "var(--text-strong)" }}>{u.name}</span></div></td>
                  <td style={{ textAlign: "right", color: "var(--text-muted)", fontVariantNumeric: "tabular-nums" }}>{avg.toFixed(1)}</td>
                  <td style={{ textAlign: "right", fontWeight: 800, color: "var(--blue-700)", fontVariantNumeric: "tabular-nums" }}>{actual}</td>
                  <td style={{ textAlign: "right", fontVariantNumeric: "tabular-nums", color: absent ? "var(--danger-500)" : "var(--text-muted)", fontWeight: absent ? 700 : 400 }}>{absent}</td>
                </tr>
              ))}
            </tbody>
          </table>
          <div style={{ padding: "12px 16px", fontSize: 12, color: "var(--text-muted)", borderTop: "1px solid var(--border-subtle)" }}>點選值日生姓名，下方日曆篩選其出勤狀況。</div>
        </div>
        <div className="dm-card" style={{ padding: 18 }}>
          <D.MonthNav year={yr} month={cm} onPrev={() => setCm(cm === 0 ? 11 : cm - 1)} onNext={() => setCm(cm === 11 ? 0 : cm + 1)} />
          <div style={{ fontSize: 12.5, color: "var(--text-muted)", margin: "10px 0 14px" }}>{pick ? `篩選：${D.userById(state.users, pick).name}` : "顯示全部值日生"}</div>
          <D.MonthCalendar year={yr} month={cm} renderCell={(ctx) => {
            const a = state.activities[ctx.dateStr];
            const who = cmSched[ctx.dateStr];
            const off = a && a.type === "off";
            const show = who && (!pick || who === pick);
            return (
              <D.DayCell ctx={ctx} tone={off ? "off" : a && a.type === "adjust" ? "adjust" : "default"} disabled={!D.isSchedulable(ctx.date, ctx.dateStr, state.activities) && !who}>
                {show ? (off
                  ? <span style={{ fontSize: 10.5, fontWeight: 700, color: "var(--danger-500)" }}>缺勤·{D.userById(state.users, who).name}</span>
                  : <D.NameChip name={D.userById(state.users, who).name} small tone={pick ? "me" : "blue"} />) : null}
              </D.DayCell>
            );
          }} />
          <div style={{ marginTop: 12 }}><D.Legend items={[["var(--blue-50)", "出勤"], ["var(--danger-50)", "缺勤 (停班)"]]} /></div>
        </div>
      </div>
    </div>
  );
}

Object.assign(window.Duty, { StatsView });

</script>

<!-- ============================================================
     SECTION 6: 頁面啟動殼 — State 管理、認證持久化、Mount
     ============================================================
     - 從 localStorage "dutymate_v1" 讀取/寫入全域 state
     - 從 localStorage "dutymate_account" / "dutymate_role" 維持跨頁登入
     - go(pageId) → window.location.href = pageId + ".html"（真實導航）
     - onNav(id) → 側邊選單跳頁（"__logout" 清除帳號）
     - onRole(r) → 視角切換（admin ↔ duty），角色不允許本頁則跳回 official
     - mount 點：ReactDOM.createRoot(#root).render(<DutyPage page="official" />)
     ============================================================ -->
<script type="text/babel">
// Duty Mate — single-page harness.
// Each page in pages/*.html sets window.__DUTY_PAGE = "<id>" then renders <DutyPage>.
// The harness reuses the exact state shape + localStorage persistence as the
// integrated index.html, but routing between pages becomes real navigation
// (go("draft") → draft.html), so each page can be developed in isolation while
// still sharing one source of truth (localStorage "dutymate_v1").
// Exposes window.DutyPage + window.mountDutyPage(id).

const { useState, useEffect } = React;

const DUTY_ALLOWED = {
  admin: ["official", "exclude", "constraint", "draft", "activity", "worktask", "users", "stats", "import", "swap"],
  duty:  ["official", "exclude", "activity", "swap"],
};

const DUTY_VIEW_EXPORT = {
  official: "OfficialView", exclude: "ExcludeView", constraint: "ConstraintView",
  draft: "DraftView", activity: "ActivityView", worktask: "WorkTaskView",
  users: "UsersView", stats: "StatsView", import: "ImportView", swap: "SwapView",
};

const dutySeed = () => {
  const D = window.Duty;
  return {
    users: D.USERS, activities: D.SEED_ACTIVITIES, exclusions: D.SEED_EXCLUSIONS,
    draft: {}, official: {}, publishedMonths: [], taskList: D.SEED_TASKS,
    year: D.SEED_YEAR, month: D.SEED_MONTH,
  };
};
const dutyLoadState = () => { try { return JSON.parse(localStorage.getItem("dutymate_v1")); } catch (e) { return null; } };
const dutyLoadAccount = () => { try { return JSON.parse(localStorage.getItem("dutymate_account")); } catch (e) { return null; } };

function DutyPage({ page }) {
  const Duty = window.Duty;
  const [account, setAccount] = useState(dutyLoadAccount);
  const [viewRole, setViewRole] = useState(() => localStorage.getItem("dutymate_role") || "admin");
  const [state, setState] = useState(() => { const s = dutyLoadState(); return s ? { ...dutySeed(), ...s } : dutySeed(); });
  const [toast, setToast] = useState(null);

  window.__dmActivities = state.activities;
  useEffect(() => { try { localStorage.setItem("dutymate_v1", JSON.stringify(state)); } catch (e) {} }, [state]);
  useEffect(() => { if (!toast) return; const t = setTimeout(() => setToast(null), 2600); return () => clearTimeout(t); }, [toast]);

  const set = (patch) => setState((s) => ({ ...s, ...patch }));
  const showToast = (msg) => setToast({ msg, id: Date.now() });
  const go = (pg) => { if (pg !== page) window.location.href = pg + ".html"; };

  if (!account) {
    return <Duty.Login onLogin={(u) => {
      const role = u.role === "admin" ? "admin" : "duty";
      localStorage.setItem("dutymate_account", JSON.stringify(u));
      localStorage.setItem("dutymate_role", role);
      if (DUTY_ALLOWED[role].includes(page)) { setAccount(u); setViewRole(role); }
      else window.location.href = "official.html";
    }} />;
  }

  // Role can't access this page → bounce to home.
  if (!DUTY_ALLOWED[viewRole].includes(page)) {
    window.location.replace("official.html");
    return null;
  }

  const onNav = (id) => {
    if (id === "__logout") { localStorage.removeItem("dutymate_account"); setAccount(null); return; }
    if (id !== page) window.location.href = id + ".html";
  };
  const onRole = (r) => {
    localStorage.setItem("dutymate_role", r);
    setViewRole(r);
    if (!DUTY_ALLOWED[r].includes(page)) window.location.href = "official.html";
  };

  const View = Duty[DUTY_VIEW_EXPORT[page]] || Duty.OfficialView;
  const props = { state, set, viewRole, account, toast: showToast, go };

  return (
    <Duty.AppShell account={account} viewRole={viewRole} onRole={onRole} page={page} onNav={onNav}>
      <View {...props} />
      {toast && <div className="dm-toast" key={toast.id}>{Duty.DutyIcons.check(16)}{toast.msg}</div>}
    </Duty.AppShell>
  );
}

function mountDutyPage(id) {
  ReactDOM.createRoot(document.getElementById("root")).render(<DutyPage page={id} />);
}

Object.assign(window, { DutyPage, mountDutyPage });

mountDutyPage("stats");
</script>
</body>
</html>
