<div id="root"></div>
<!-- base runtime -->
<script type="text/babel" src="DutyKit.jsx"></script>
<script type="text/babel" src="DutyCalendar.jsx"></script>
<script type="text/babel" src="DutyShell.jsx"></script>
<script type="text/babel" src="DutyViewShared.jsx"></script>
<!-- page views (one file each — shared with pages/*.html) -->
<script type="text/babel" src="views/OfficialView.jsx"></script>
<script type="text/babel" src="views/ExcludeView.jsx"></script>
<script type="text/babel" src="views/ConstraintView.jsx"></script>
<script type="text/babel" src="views/DraftView.jsx"></script>
<script type="text/babel" src="views/ActivityView.jsx"></script>
<script type="text/babel" src="views/WorkTaskView.jsx"></script>
<script type="text/babel" src="views/UsersView.jsx"></script>
<script type="text/babel" src="views/StatsView.jsx"></script>
<script type="text/babel" src="views/ImportView.jsx"></script>
<script type="text/babel" src="views/SwapView.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;
const Duty = window.Duty;

const seed = () => ({
  users: Duty.USERS,
  activities: Duty.SEED_ACTIVITIES,
  exclusions: Duty.SEED_EXCLUSIONS,
  draft: {}, official: {}, publishedMonths: [],
  taskList: Duty.SEED_TASKS,
  year: Duty.SEED_YEAR, month: Duty.SEED_MONTH,
});
function load() { try { return JSON.parse(localStorage.getItem("dutymate_v1")); } catch (e) { return null; } }

const ALLOWED = {
  admin: ["official", "exclude", "constraint", "draft", "activity", "worktask", "users", "stats", "import", "swap"],
  duty:  ["official", "exclude", "activity", "swap"],
};

function App() {
  const [account, setAccount] = useState(null);
  const [viewRole, setViewRole] = useState("admin");
  const [page, setPage] = useState("official");
  const [state, setState] = useState(() => { const s = load(); return s ? { ...seed(), ...s } : seed(); });
  const [toast, setToast] = useState(null);

  window.__dmActivities = state.activities;
  useEffect(() => { try { localStorage.setItem("dutymate_v1", JSON.stringify(state)); } catch (e) {} }, [state]);
  useEffect(() => { if (!toast) return; const t = setTimeout(() => setToast(null), 2600); return () => clearTimeout(t); }, [toast]);

  const set = (patch) => setState((s) => ({ ...s, ...patch }));
  const showToast = (msg) => setToast({ msg, id: Date.now() });
  const go = (pg) => setPage(pg);

  if (!account) {
    return <Duty.Login onLogin={(u) => { setAccount(u); setViewRole(u.role === "admin" ? "admin" : "duty"); setPage("official"); }} />;
  }

  const onNav = (id) => { if (id === "__logout") { setAccount(null); return; } setPage(id); };
  const safePage = ALLOWED[viewRole].includes(page) ? page : "official";
  const Views = {
    official: Duty.OfficialView, exclude: Duty.ExcludeView, constraint: Duty.ConstraintView,
    draft: Duty.DraftView, activity: Duty.ActivityView, worktask: Duty.WorkTaskView, users: Duty.UsersView,
    stats: Duty.StatsView, import: Duty.ImportView, swap: Duty.SwapView,
  };
  const View = Views[safePage] || Duty.OfficialView;
  const props = { state, set, viewRole, account, toast: showToast, go };

  return (
    <Duty.AppShell account={account} viewRole={viewRole}
      onRole={(r) => { setViewRole(r); if (!ALLOWED[r].includes(page)) setPage("official"); }}
      page={safePage} onNav={onNav}>
      <View {...props} />
      {toast && <div className="dm-toast" key={toast.id}>{Duty.DutyIcons.check(16)}{toast.msg}</div>}
    </Duty.AppShell>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
