<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一鍵發薪 · 雲端人資管理系統</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; background: var(--surface-page); }
</style>
</head>
<body>
<div id="root" data-screen-label="一鍵發薪 App"></div>
<script type="text/babel" src="AppShell.jsx"></script>
<script type="text/babel" src="HRViews.jsx"></script>
<script type="text/babel">
  function App() {
    const [view, setView] = React.useState("dashboard");
    const Views = { dashboard: window.HRDashboard, payroll: window.HRPayroll };
    // Modules without a dedicated screen route to the payroll table demo.
    const Active = Views[view] || window.HRPayroll;
    return (
      <window.AppShell active={view} onNav={setView}>
        <Active />
      </window.AppShell>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
